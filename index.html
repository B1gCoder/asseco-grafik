<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Grafik Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="top-actions">
                <button onclick="eksportujDoKalendarza()" class="btn-export">📅 Eksportuj</button>
            </div>
            <h1>Mój Grafik</h1>
            <p class="subtitle" id="nastepna-zmiana">Synchronizacja...</p>
        </header>

        <div class="progress-section">
            <div class="progress-info">
                <span>Postęp miesiąca</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="statystyki-panel">
            <div class="stat-karta">
                <div class="stat-tytul">Suma godzin</div>
                <div class="stat-wartosc" id="stat-suma">0h</div>
            </div>
            <div class="stat-karta">
                <div class="stat-tytul">Zrobione</div>
                <div class="stat-wartosc" id="stat-zrobione">0h</div>
            </div>
            <div class="stat-karta akcent">
                <div class="stat-tytul">Zarobiono</div>
                <div class="stat-wartosc" id="stat-zarobiono">0 zł</div>
            </div>
            <div class="stat-karta akcent-kasa">
                <div class="stat-tytul">Wypłata</div>
                <div class="stat-wartosc" id="stat-wyplata">0 zł</div>
            </div>
        </div>
        
        <div id="grafik-pojemnik">
            <div class="loader">Ładowanie grafiku z systemu...</div>
        </div>
    </div>

    <script>
        // Rejestracja Service Workera dla PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("Błąd SW:", err));
        }

        // Dane finansowe i liczniki
        let lacznieGodzin = 0, zrobioneGodzin = 0, lacznieZarobki = 0, obecneZarobki = 0;
        const STAWKA_DZIEN = 22.60;
        const STAWKA_NOC = 28.50;
        
        let daneGrafiku = [];
        let przepracowaneDni = JSON.parse(localStorage.getItem('przepracowane')) || [];

        // Funkcja obliczająca czas trwania zmiany
        function policzCzas(od, doG) {
            if (!od || !doG || (od === '00:00' && doG === '00:00')) return 0;
            let start = parseInt(od.split(':')[0]) + parseInt(od.split(':')[1])/60;
            let koniec = parseInt(doG.split(':')[0]) + parseInt(doG.split(':')[1])/60;
            return koniec < start ? (koniec + 24) - start : koniec - start;
        }

        // Formatowanie waluty do polskiego standardu
        function formatujPLN(kwota) {
            return kwota.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' zł';
        }

        // Aktualizacja interfejsu
        function aktualizujUI() {
            document.getElementById('stat-suma').innerText = lacznieGodzin + 'h';
            document.getElementById('stat-zrobione').innerText = zrobioneGodzin + 'h';
            document.getElementById('stat-zarobiono').innerText = formatujPLN(obecneZarobki);
            document.getElementById('stat-wyplata').innerText = formatujPLN(lacznieZarobki);
            
            const procent = lacznieGodzin > 0 ? (zrobioneGodzin / lacznieGodzin * 100) : 0;
            document.getElementById('progress-fill').style.width = procent + '%';
            document.getElementById('progress-percent').innerText = Math.round(procent) + '%';
        }

        async function pobierzGrafik() {
            try {
                const res = await fetch('moj_grafik.json?v=' + Date.now());
                daneGrafiku = await res.json();
                const poj = document.getElementById('grafik-pojemnik');
                poj.innerHTML = '';
                
                const dzisiaj = new Date();
                const dzisiajStr = dzisiaj.toISOString().split('T')[0];
                let nastepnaZmianaZaleziona = false;

                daneGrafiku.forEach((dz, i) => {
                    const czas = policzCzas(dz.od, dz.do);
                    const nocka = dz.od === '22:00';
                    const kasa = czas * (nocka ? STAWKA_NOC : STAWKA_DZIEN);
                    const odhaczony = przepracowaneDni.includes(dz.data);
                    const wolne = czas === 0;

                    lacznieGodzin += czas;
                    lacznieZarobki += kasa;
                    if(odhaczony) { zrobioneGodzin += czas; obecneZarobki += kasa; }

                    // ODLICZANIE DO ZMIANY (Obsługa formatu: "21-04-2026 wtorek")
                    if (!wolne && !nastepnaZmianaZaleziona) {
                        const czystaData = dz.data.split(' ')[0].trim();
                        const czesci = czystaData.split('-');
                        const dataZmiany = new Date(parseInt(czesci[2]), parseInt(czesci[1]) - 1, parseInt(czesci[0]), parseInt(dz.od.split(':')[0]), parseInt(dz.od.split(':')[1]));
                        
                        if (dataZmiany > dzisiaj) {
                            nastepnaZmianaZaleziona = true;
                            const diff = dataZmiany - dzisiaj;
                            const h = Math.floor(diff / (1000 * 60 * 60));
                            document.getElementById('nastepna-zmiana').innerHTML = h < 24 ? `⏳ Zmiana za: <b>~${h}h</b>` : `⏳ Zmiana za: <b>${Math.floor(h/24)} dni</b>`;
                        }
                    }

                    const karta = document.createElement('div');
                    karta.className = `dzien-karta ${wolne?'wolne':''} ${dz.data.startsWith(dzisiajStr)?'dzisiaj':''} ${odhaczony?'odhaczone':''}`;
                    
                    karta.innerHTML = `
                        <div class="lewa-strona">
                            <label class="custom-checkbox ${wolne?'ukryty':''}">
                                <input type="checkbox" onchange="toggleDzien('${dz.data}', ${czas}, ${kasa}, this)" ${odhaczony?'checked':''}>
                                <span class="checkmark"></span>
                            </label>
                            <div class="data-blok">
                                <div class="data">${dz.data}</div>
                            </div>
                        </div>
                        <div class="godziny">${wolne?'WOLNE 🎉':`${dz.od}-${dz.do} ${nocka?'🌙':'☀️'}`}</div>
                    `;
                    poj.appendChild(karta);
                });

                if(!nastepnaZmianaZaleziona) document.getElementById('nastepna-zmiana').innerText = "Wszystkie zmiany za Tobą! 🍻";
                aktualizujUI();
            } catch (e) {
                document.getElementById('grafik-pojemnik').innerHTML = '<div class="karta-bledu">Błąd ładowania danych.</div>';
            }
        }

        function toggleDzien(data, h, pln, el) {
            if(el.checked) {
                przepracowaneDni.push(data);
                zrobioneGodzin += h; obecneZarobki += pln;
                el.closest('.dzien-karta').classList.add('odhaczone');
            } else {
                przepracowaneDni = przepracowaneDni.filter(d => d !== data);
                zrobioneGodzin -= h; obecneZarobki -= pln;
                el.closest('.dzien-karta').classList.remove('odhaczone');
            }
            localStorage.setItem('przepracowane', JSON.stringify(przepracowaneDni));
            aktualizujUI();
        }

        function eksportujDoKalendarza() {
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AssecoBot//PL\n";
            daneGrafiku.forEach(dz => {
                if(dz.od && dz.od !== '00:00') {
                    const c = dz.data.split(' ')[0].split('-');
                    const s = c[2]+c[1]+c[0]+'T'+dz.od.replace(':','')+'00';
                    let kData = new Date(c[2], c[1]-1, c[0]);
                    if(dz.od === '22:00') kData.setDate(kData.getDate()+1);
                    const k = kData.toISOString().split('T')[0].replace(/-/g,'')+'T'+dz.do.replace(':','')+'00';
                    ics += `BEGIN:VEVENT\nSUMMARY:Praca Asseco\nDTSTART:${s}\nDTEND:${k}\nEND:VEVENT\n`;
                }
            });
            ics += "END:VCALENDAR";
            const blob = new Blob([ics], {type: 'text/calendar'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'grafik.ics'; a.click();
        }

        pobierzGrafik();
    </script>
</body>
</html>
