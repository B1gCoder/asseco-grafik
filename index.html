<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Grafik Pracy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Mój Grafik</h1>
            <p class="subtitle">Harmonogram na najbliższe dni</p>
        </header>
        
        <div id="grafik-pojemnik">
            <div class="loader">Synchronizacja z chmurą...</div>
        </div>
    </div>

    <script>
        async function pobierzIWyswietlGrafik() {
            try {
                const odpowiedz = await fetch('moj_grafik.json');
                const dane = await odpowiedz.json();
                
                const pojemnik = document.getElementById('grafik-pojemnik');
                pojemnik.innerHTML = ''; 

                dane.forEach(dzien => {
                    const karta = document.createElement('div');
                    
                    // 1. Sprawdzamy czy to dzień wolny (brak godzin lub 00:00 - 00:00)
                    const czyWolne = !dzien.od || dzien.od.trim() === '' || (dzien.od === '00:00' && dzien.do === '00:00');
                    
                    // 2. Sprawdzamy czy to nocka (zaczyna się o 22:00)
                    const czyNocka = dzien.od === '22:00'; 
                    
                    // 3. Sprawdzamy czy ten kafelek to dzisiejszy dzień
                    const dzisiejszaData = new Date().toISOString().split('T')[0]; // Format YYYY-MM-DD
                    const czyDzisiaj = dzien.data === dzisiejszaData;
                    
                    // Przypisujemy odpowiednie klasy CSS
                    karta.className = 'dzien-karta' + (czyWolne ? ' wolne' : '') + (czyDzisiaj ? ' dzisiaj' : '');
                    
                    // Budujemy tekst godzin z odpowiednimi emotikonami
                    let godzinyTekst = '';
                    if (czyWolne) {
                        godzinyTekst = 'WOLNE 🎉';
                    } else {
                        godzinyTekst = `${dzien.od} - ${dzien.do} ${czyNocka ? '🌙' : '☀️'}`;
                    }

                    // Wrzucamy dane do kafelka (dodajemy też mały napis "Dzisiaj")
                    karta.innerHTML = `
                        <div class="data">
                            ${dzien.data}
                            ${czyDzisiaj ? '<span style="color: #ef4444; font-size: 0.8em; margin-left: 8px; font-weight: 800;">Dzisiaj!</span>' : ''}
                        </div>
                        <div class="godziny">${godzinyTekst}</div>
                    `;
                    
                    pojemnik.appendChild(karta);
                });
            } catch (blad) {
                document.getElementById('grafik-pojemnik').innerHTML = '<div class="karta-bledu">Nie udało się załadować danych.</div>';
                console.error(blad);
            }
        }

        pobierzIWyswietlGrafik();
    </script>
</body>
</html>
