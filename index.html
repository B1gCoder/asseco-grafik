<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Grafik Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="top-actions">
                <button onclick="eksportujDoKalendarza()" class="btn-export">📅 Eksportuj</button>
            </div>
            <h1>Mój Grafik</h1>
            <p class="subtitle" id="nastepna-zmiana">Ładowanie...</p>
        </header>

        <div class="progress-section">
            <div class="progress-info">
                <span>Postęp miesiąca</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="statystyki-panel">
            <div class="stat-karta">
                <div class="stat-tytul">Suma godzin</div>
                <div class="stat-wartosc" id="stat-suma">0h</div>
            </div>
            <div class="stat-karta">
                <div class="stat-tytul">Zrobione</div>
                <div class="stat-wartosc" id="stat-zrobione">0h</div>
            </div>
            <div class="stat-karta akcent">
                <div class="stat-tytul">Zarobiono</div>
                <div class="stat-wartosc" id="stat-zarobiono">0 zł</div>
            </div>
            <div class="stat-karta akcent-kasa">
                <div class="stat-tytul">Wypłata</div>
                <div class="stat-wartosc" id="stat-wyplata">0 zł</div>
            </div>
        </div>
        
        <div id="grafik-pojemnik">
            <div class="loader">Synchronizacja...</div>
        </div>
    </div>

    <script>
        // --- PWA: Rejestracja Service Workera ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let lacznieGodzin = 0, zrobioneGodzin = 0, lacznieZarobki = 0, obecneZarobki = 0;
        const STAWKA_DZIEN = 22.60, STAWKA_NOC = 28.50;
        let daneGrafiku = [];
        let przepracowaneDni = JSON.parse(localStorage.getItem('przepracowane')) || [];

        function policzCzas(od, doG) {
            if (!od || !doG || (od === '00:00' && doG === '00:00')) return 0;
            let start = parseInt(od.split(':')[0]) + parseInt(od.split(':')[1])/60;
            let koniec = parseInt(doG.split(':')[0]) + parseInt(doG.split(':')[1])/60;
            return koniec < start ? (koniec + 24) - start : koniec - start;
        }

        function aktualizujUI() {
            document.getElementById('stat-suma').innerText = lacznieGodzin + 'h';
            document.getElementById('stat-zrobione').innerText = zrobioneGodzin + 'h';
            document.getElementById('stat-zarobiono').innerText = obecneZarobki.toFixed(2) + ' zł';
            document.getElementById('stat-wyplata').innerText = lacznieZarobki.toFixed(2) + ' zł';
            
            // Postęp
            const procent = lacznieGodzin > 0 ? (zrobioneGodzin / lacznieGodzin * 100) : 0;
            document.getElementById('progress-fill').style.width = procent + '%';
            document.getElementById('progress-percent').innerText = Math.round(procent) + '%';
        }

        async function pobierzGrafik() {
            const res = await fetch('moj_grafik.json?v=' + Date.now());
            daneGrafiku = await res.json();
            const poj = document.getElementById('grafik-pojemnik');
            poj.innerHTML = '';
            
            const dzisiaj = new Date();
            const dzisiajStr = dzisiaj.toISOString().split('T')[0];
            let nastepnaZmianaZaleziona = false;

            daneGrafiku.forEach((dz, i) => {
                const czas = policzCzas(dz.od, dz.do);
                const nocka = dz.od === '22:00';
                const kasa = czas * (nocka ? STAWKA_NOC : STAWKA_DZIEN);
                const odhaczony = przepracowaneDni.includes(dz.data);
                const wolne = czas === 0;

                lacznieGodzin += czas;
                lacznieZarobki += kasa;
                if(odhaczony) { zrobioneGodzin += czas; obecneZarobki += kasa; }

                // NAPRAWIONE ODLICZANIE (Kuloodporne tworzenie daty)
                if (!wolne && !nastepnaZmianaZaleziona) {
                    // Rozbijamy datę i godzinę na części pierwsze
                    const [rok, miesiac, dzien] = dz.data.split('-');
                    const [godz, min] = dz.od.split(':');
                    
                    // JavaScript liczy miesiące od 0, dlatego robimy miesiac - 1
                    const dataZmiany = new Date(rok, miesiac - 1, dzien, godz, min);
                    
                    if (dataZmiany > dzisiaj) {
                        nastepnaZmianaZaleziona = true;
                        const zostaloGodzin = Math.floor((dataZmiany - dzisiaj) / (1000 * 60 * 60));
                        if(zostaloGodzin < 24) {
                            document.getElementById('nastepna-zmiana').innerHTML = `⏳ Następna zmiana za: <b>~${zostaloGodzin}h</b>`;
                        } else {
                            document.getElementById('nastepna-zmiana').innerHTML = `⏳ Następna zmiana za: <b>${Math.floor(zostaloGodzin / 24)} dni</b>`;
                        }
                    }
                }

                const karta = document.createElement('div');
                karta.className = `dzien-karta ${wolne?'wolne':''} ${dz.data===dzisiajStr?'dzisiaj':''} ${odhaczony?'odhaczone':''}`;
                karta.innerHTML = `
                    <div class="lewa-strona">
                        <label class="custom-checkbox ${wolne?'ukryty':''}">
                            <input type="checkbox" onchange="toggleDzien('${dz.data}', ${czas}, ${kasa}, this)" ${odhaczony?'checked':''}>
                            <span class="checkmark"></span>
                        </label>
                        <div class="data-blok">
                            <div class="data">${dz.data}</div>
                            ${dz.data===dzisiajStr?'<div class="dzisiaj-tag">Dzisiaj</div>':''}
                        </div>
                    </div>
                    <div class="godziny">${wolne?'WOLNE':`${dz.od}-${dz.do} ${nocka?'🌙':'☀️'}`}</div>
                `;
                poj.appendChild(karta);
            });

            if(!nastepnaZmianaZaleziona) {
                document.getElementById('nastepna-zmiana').innerText = "Wszystkie zmiany w tym miesiącu za Tobą! 🍻";
            }

            aktualizujUI();
        }

        function toggleDzien(data, h, pln, el) {
            if(el.checked) {
                przepracowaneDni.push(data);
                zrobioneGodzin += h; obecneZarobki += pln;
                el.closest('.dzien-karta').classList.add('odhaczone');
            } else {
                przepracowaneDni = przepracowaneDni.filter(d => d !== data);
                zrobioneGodzin -= h; obecneZarobki -= pln;
                el.closest('.dzien-karta').classList.remove('odhaczone');
            }
            localStorage.setItem('przepracowane', JSON.stringify(przepracowaneDni));
            aktualizujUI();
        }

        // --- EKSPORT DO KALENDARZA (.ics) ---
        function eksportujDoKalendarza() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//AssecoBot//PL\n";
            daneGrafiku.forEach(dz => {
                if(dz.od && dz.od !== '00:00') {
                    const start = dz.data.replace(/-/g, '') + 'T' + dz.od.replace(':', '') + '00';
                    let koniecData = dz.data;
                    if(dz.od === '22:00') { // Jeśli nocka, koniec jest następnego dnia
                        let d = new Date(dz.data);
                        d.setDate(d.getDate() + 1);
                        koniecData = d.toISOString().split('T')[0];
                    }
                    const koniec = koniecData.replace(/-/g, '') + 'T' + dz.do.replace(':', '') + '00';
                    icsContent += `BEGIN:VEVENT\nSUMMARY:Praca Asseco\nDTSTART:${start}\nDTEND:${koniec}\nEND:VEVENT\n`;
                }
            });
            icsContent += "END:VCALENDAR";
            const blob = new Blob([icsContent], {type: 'text/calendar'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'grafik.ics'; a.click();
        }

        pobierzGrafik();
    </script>
</body>
</html>
